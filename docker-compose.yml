services:

  # ── PostgreSQL Database ───────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: qpilot_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: qpilot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST_AUTH_METHOD: trust

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d qpilot"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ───────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile

    container_name: qpilot_backend
    restart: unless-stopped

    ports:
      - "8000:8000"

    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/qpilot
      SECRET_KEY: qpilot_super_secret_key
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: gpt-4o
      APP_ENV: development
      CORS_ORIGINS: http://localhost:3000

    depends_on:
      db:
        condition: service_healthy

    volumes:
      - ./backend:/app

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Next.js Frontend ──────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile

    container_name: qpilot_frontend
    restart: unless-stopped

    ports:
      - "3000:3000"

    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_APP_NAME: QPilot AI

    depends_on:
      - backend

    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

  # ── n8n Workflow Engine ───────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: qpilot_n8n
    restart: unless-stopped

    ports:
      - "5678:5678"

    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: admin
      N8N_BASIC_AUTH_PASSWORD: admin

      N8N_HOST: 0.0.0.0
      N8N_PORT: 5678
      N8N_PROTOCOL: http

      WEBHOOK_URL: http://localhost:5678

      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: db
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: postgres
      DB_POSTGRESDB_PASSWORD: postgres

      GENERIC_TIMEZONE: UTC

    depends_on:
      db:
        condition: service_healthy

    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  postgres_data:
  n8n_data:

networks:
  default:
    name: qpilot_network